<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>SnapPaste</title>
  <style>
    :root {
      --bg: #f6f4ee;
      --card: rgba(255, 255, 255, 0.88);
      --text: #1f2937;
      --muted: #5b6472;
      --accent: #0f766e;
      --border: rgba(15, 23, 42, 0.08);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(15, 118, 110, 0.14), transparent 32%),
        linear-gradient(180deg, #fbfaf6 0%, var(--bg) 100%);
      min-height: 100vh;
    }

    .wrap {
      max-width: 860px;
      margin: 0 auto;
      padding: 72px 24px;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 40px;
      box-shadow: 0 24px 60px rgba(15, 23, 42, 0.08);
      backdrop-filter: blur(10px);
    }

    h1 {
      margin: 0 0 12px;
      font-size: clamp(2rem, 4vw, 3.25rem);
      line-height: 1.05;
    }

    p {
      margin: 0 0 16px;
      line-height: 1.7;
      color: var(--muted);
    }

    .links {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-top: 28px;
    }

    a.button {
      display: inline-block;
      padding: 12px 18px;
      border-radius: 999px;
      background: var(--accent);
      color: white;
      text-decoration: none;
      font-weight: 600;
    }

    a.secondary {
      background: white;
      color: var(--text);
      border: 1px solid var(--border);
    }
  </style>
</head>
<body>
  <main class="wrap">
    <section class="card">
      <p>SnapPaste for macOS</p>
      <h1>Local-first clipboard history for Mac.</h1>
      <p>
        SnapPaste helps you find, search, favorite, and paste copied content again.
        Clipboard history stays on your device by default.
      </p>
      <div class="links">
        <a class="button" href="./privacy/">Privacy Policy</a>
        <a class="button secondary" href="./support/">Support</a>
      </div>
    </section>
  </main>
</body>
</html>
